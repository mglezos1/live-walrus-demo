<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Verifier — Check Proof</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Verifier</h1>

  <section>
    <h2>Proof</h2>
    <textarea id="proofInput" rows="10" cols="80"></textarea>
  </section>

  <section>
    <h2>Public Signals</h2>
    <textarea id="publicInput" rows="5" cols="80"></textarea>
  </section>

  <button onclick="verify()">Verify Proof</button>

  <section>
    <h2>Result</h2>
    <pre id="result">No verification yet</pre>
  </section>

  <script>
    async function verify() {
      try {
        const proof = JSON.parse(
          document.getElementById("proofInput").value
        );
        const publicSignals = JSON.parse(
          document.getElementById("publicInput").value
        );

        const res = await fetch("/proof/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ proof, publicSignals })
        });

        const result = await res.json();
        document.getElementById("result").textContent =
          result.valid ? "✅ VALID PROOF" : "❌ INVALID PROOF";
      } catch (e) {
        document.getElementById("result").textContent =
          "Invalid JSON input";
      }
    }
  </script>
</body>
</html>
