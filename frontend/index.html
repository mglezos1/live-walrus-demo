<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Zero-Knowledge Medical Analytics</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 800px;
    }
    section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }
    input, button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      font-size: 14px;
    }
    button {
      cursor: pointer;
      background: #222;
      color: white;
      border: none;
    }
    pre {
      background: #f4f4f4;
      padding: 15px;
      overflow-x: auto;
    }
    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>

<h1>🔐 Zero-Knowledge Medical Analytics</h1>

<p>
  Upload a medical dataset, store it on Walrus, then prove —
  using zero-knowledge — how many patients are under 18 and diabetic.
</p>

<section>
  <h2>1️⃣ Upload Dataset</h2>

  <input type="file" id="datasetFile" accept=".json" />

  <button onclick="uploadDataset()">
    Upload Dataset to Walrus
  </button>

  <div id="uploadResult"></div>
</section>

<section>
  <h2>2️⃣ Run ZK Proof</h2>

  <input
    id="blobId"
    type="text"
    placeholder="Blob ID will appear here after upload"
  />

  <button onclick="runProof()">
    Run ZK Proof (Under-18 Diabetic Count)
  </button>

  <div id="proofResult"></div>
</section>

<script>
  // MUST be global (not inside another function)

  async function uploadDataset() {
    const fileInput = document.getElementById("datasetFile");
    const resultDiv = document.getElementById("uploadResult");

    if (!fileInput.files.length) {
      alert("Please select a JSON file.");
      return;
    }

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    resultDiv.innerHTML = "<p>Uploading to Walrus…</p>";

    try {
      const res = await fetch("http://localhost:3000/upload/dataset", {
        method: "POST",
        body: formData
      });

      const data = await res.json();

      if (data.error) throw new Error(data.error);

      document.getElementById("blobId").value = data.blobId;

      resultDiv.innerHTML = `
        <p class="success">Upload successful</p>
        <pre>${data.blobId}</pre>
      `;
    } catch (err) {
      resultDiv.innerHTML = `
        <p class="error">Upload failed</p>
        <pre>${err.message}</pre>
      `;
    }
  }

  async function runProof() {
    const blobId = document.getElementById("blobId").value.trim();
    const resultDiv = document.getElementById("proofResult");

    if (!blobId) {
      alert("Upload a dataset first.");
      return;
    }

    resultDiv.innerHTML = "<p>Running ZK proof…</p>";

    try {
      const res = await fetch(
        "http://localhost:3000/proof/juvenile-diabetes/under18/count",
        {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ blobId })
        }
      );

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      resultDiv.innerHTML = `
        <p class="success">Proof complete</p>
        <p><strong>Count:</strong> ${data.count}</p>
        <p><strong>Total:</strong> ${data.total}</p>
        <pre>${JSON.stringify(data.publicSignals, null, 2)}</pre>
      `;
    } catch (err) {
      resultDiv.innerHTML = `
        <p class="error">Proof failed</p>
        <pre>${err.message}</pre>
      `;
    }
  }
</script>

</body>
</html>
