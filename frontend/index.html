<!DOCTYPE html>
<html>
<head>
    <title>Selective ZKP Form</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        input { width: 300px; margin: 5px 0; padding: 5px; }
        button { padding: 10px; width: 200px; }
        pre { background: #eee; padding: 10px; }
    </style>
</head>
<body>

<h2>Upload Patient Data + Generate Proof</h2>

<label>Patient Name:</label><br>
<input id="name"><br>

<label>Patient ID:</label><br>
<input id="patientId"><br>

<label>Gender:</label><br>
<input id="genderHash"><br>

<label>Address:</label><br>
<input id="addressHash"><br>

<label>Symptoms:</label><br>
<input id="symptoms"><br>

<label>Age:</label><br>
<input id="age"><br>

<label>COVID Result (0 or 1):</label><br>
<input id="actual_result"><br>

<br>
<button onclick="submitZKP()">Generate Proof + Upload</button>

<h3>Server Response:</h3>
<pre id="responseBox"></pre>

<p>Go to <a href="verify.html">Verify Page</a> to retrieve with access key.</p>

<script>
async function submitZKP() {
    const data = {
        name: document.getElementById("name").value,
        patientId: document.getElementById("patientId").value,
        genderHash: document.getElementById("genderHash").value,
        addressHash: document.getElementById("addressHash").value,
        symptoms: document.getElementById("symptoms").value,
        age: document.getElementById("age").value,
        actual_result: document.getElementById("actual_result").value,
        testNonce: "123456"
    };

    try {
        const res = await fetch("/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const json = await res.json();
        document.getElementById("responseBox").innerText =
            JSON.stringify(json, null, 2);

    } catch (err) {
        document.getElementById("responseBox").innerText = err.toString();
    }
}
</script>

</body>
</html>
