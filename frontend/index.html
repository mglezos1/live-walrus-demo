<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ZK Dataset Proof Demo</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
    }
    button {
      padding: 10px;
      margin-top: 10px;
    }
    pre {
      background: #f4f4f4;
      padding: 10px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<h2>ZK Dataset Proof (Walrus + ZK)</h2>

<h3>1. Upload dataset</h3>
<input type="file" id="file" />
<br />
<button onclick="uploadDataset()">Upload Dataset</button>

<p id="uploadStatus"></p>

<hr />

<h3>2. Prove: AGE ≥ 18 (count)</h3>
<button onclick="proveAge18Count()">Generate Proof</button>

<pre id="result"></pre>

<script>
let blobId = null;

async function uploadDataset() {
  const fileInput = document.getElementById("file");
  const file = fileInput.files[0];

  if (!file) {
    alert("Please select a JSON file");
    return;
  }

  const form = new FormData();
  form.append("file", file);

  const res = await fetch("http://localhost:3000/upload/dataset", {
    method: "POST",
    body: form
  });

  const data = await res.json();
  blobId = data.blobId;

  document.getElementById("uploadStatus").innerText =
    "Uploaded successfully. Blob ID:\n" + blobId;
}

async function proveAge18Count() {
  if (!blobId) {
    alert("Upload a dataset first");
    return;
  }

  const res = await fetch("http://localhost:3000/proof/age18/count", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ blobId })
  });

  const data = await res.json();

  if (data.count !== undefined) {
    document.getElementById("result").innerText =
      "✔ ZK Proof valid\n\n" +
      data.count + " out of " + data.total + " records are AGE ≥ 18";
  } else {
    document.getElementById("result").innerText =
      JSON.stringify(data, null, 2);
  }
}
</script>

</body>
</html>
