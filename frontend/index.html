<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>ZK Proof Playground</title>
  <style>
    body {
      font-family: monospace;
      background: #111;
      color: #eee;
      padding: 20px;
    }
    textarea, input, button, select {
      width: 100%;
      margin: 5px 0 15px 0;
      padding: 8px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
    }
    button {
      cursor: pointer;
    }
    .box {
      border: 1px solid #333;
      padding: 15px;
      margin-bottom: 20px;
    }
    pre {
      background: #000;
      padding: 10px;
      overflow-x: auto;
    }
  </style>
</head>

<body>
  <h1>ZK Proof Playground</h1>

  <div class="box">
    <h2>1. Issue Capability</h2>
    <select id="role">
      <option value="researcher">researcher</option>
    </select>
    <button onclick="issueCapability()">Issue Capability</button>
    <textarea id="capability" rows="3"
      placeholder="Capability token will appear here"></textarea>
  </div>

  <div class="box">
    <h2>2. Dataset (JSON)</h2>
    <textarea id="dataset" rows="8">
[
  { "age": 17, "pregnant": 1 },
  { "age": 22, "pregnant": 0 },
  { "age": 15, "pregnant": 1 }
]
    </textarea>
  </div>

  <div class="box">
    <h2>3. Conditions (JSON)</h2>
    <textarea id="conditions" rows="6">
[
  { "field": "age", "op": "<=", "value": 18 },
  { "field": "pregnant", "op": "==", "value": 1 }
]
    </textarea>
  </div>

  <div class="box">
    <h2>4. Generate Proof</h2>
    <button onclick="generateProof()">Generate Proof</button>
    <pre id="proofOutput"></pre>
  </div>

  <div class="box">
    <h2>5. Verify Proof</h2>
    <button onclick="verifyProof()">Verify Proof</button>
    <pre id="verifyOutput"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
