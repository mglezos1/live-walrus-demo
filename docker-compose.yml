version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: walrus-mvp-backend
    ports:
      - "3000:3000"
    volumes:
      - ./circuits:/app/circuits
      - ./data:/app/data
      - ./keys:/app/keys
      - ./uploads:/app/uploads
      - ./downloads:/app/downloads
      - ~/.sui:/root/.sui:ro  # Sui wallet (read-only)
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - walrus-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: walrus-mvp-tunnel
    command: tunnel run
    volumes:
      - ./cloudflare:/etc/cloudflared
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - walrus-network

networks:
  walrus-network:
    driver: bridge
