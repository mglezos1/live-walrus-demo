# Testnet backend with real Walrus + Sui CLIs inside the image.
# 1) Copy your local ~/.sui/sui_config (client.yaml + keystore) into ./secrets/sui_config/
# 2) cp .env.example .env.production && fill in contract IDs and INVITE_TOKEN
# 3) docker compose --env-file .env.production up --build
#
# Fund the active address on Sui testnet + Wal testnet before inviting testers.

services:
  api:
    build: .
    ports:
      - "${HOST_PORT:-3000}:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: "3000"
      SUI_WALLET_PATH: /root/.sui/sui_config/client.yaml
    volumes:
      - ./secrets/sui_config:/root/.sui/sui_config:ro
